name: Multi-Stage Deployment

on:
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Check to bump to next Minor (e.g., 1.0.5 -> 1.1.0). Uncheck for Patch (1.0.5 -> 1.0.6).'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    outputs:
      resolved_tag: ${{ steps.gitversion.outputs.semVer }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
        env:
          # Method 1: Use Environment Variables to handle the override
          GITVERSION_BRANCHES_MAIN_INCREMENT: ${{ github.event.inputs.bump_version == 'true' && 'Minor' || 'Patch' }}

      - name: Generate and Push Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use the semVer output from the 'gitversion' step
          NEW_TAG="v-${{ steps.gitversion.outputs.semVer }}"
          
          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "Successfully tagged and pushed: $NEW_TAG"
          else
            echo "Tag $NEW_TAG already exists. Skipping."
          fi

      - name: Dev deployment started
        run: |
          echo "========================================"
          echo "  DEV DEPLOYMENT STARTED"
          echo "  Version: v-${{ steps.gitversion.outputs.semVer }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Run:     ${{ github.run_number }}"
          echo "========================================"

      - name: Deploy to dev
        run: |
          echo "Deploying v-${{ steps.gitversion.outputs.semVer }} to dev environment..."
          # TODO: replace with actual deployment commands


  deploy-test:
    name: Deploy to Test
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          overrideConfig: ${{ github.event.inputs.bump_version == 'true' && '"branches.main.increment=Minor"' || '' }}

      - name: Generate  Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          NEW_TAG="v-${{ steps.gitversion.outputs.semVer }}"
          
          # Only tag if it doesn't already exist to avoid errors
          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "Tagged and pushed: $NEW_TAG"
          else
            echo "Tag $NEW_TAG already exists. Skipping tag creation."
          fi

      - name: Test deployment started
        run: |
          echo "========================================"
          echo "  TEST DEPLOYMENT STARTED"
          echo "  Version: ${{ steps.tag.outputs.tag }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Run:     ${{ github.run_number }}"
          echo "========================================"

      - name: Deploy to test
        run: |
          echo "Deploying ${{ steps.tag.outputs.tag }} to test environment..."
          # TODO: replace with actual deployment commands


    outputs:
      tag: ${{ steps.tag.outputs.tag }}

  deploy-live:
    name: Deploy to Live
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: live

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          overrideConfig: ${{ github.event.inputs.bump_version == 'true' && '"branches.main.increment=Minor"' || '' }}

      - name: Generate  Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          NEW_TAG="v-${{ steps.gitversion.outputs.semVer }}"
          
          # Only tag if it doesn't already exist to avoid errors
          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "Tagged and pushed: $NEW_TAG"
          else
            echo "Tag $NEW_TAG already exists. Skipping tag creation."
          fi

      - name: Live deployment started
        run: |
          echo "========================================"
          echo "  LIVE DEPLOYMENT STARTED"
          echo "  Version: ${{ steps.tag.outputs.tag }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Run:     ${{ github.run_number }}"
          echo "========================================"

      - name: Deploy to live
        run: |
          echo "Deploying ${{ steps.tag.outputs.tag }} to live environment..."
          # TODO: replace with actual deployment commands


    outputs:
      tag: ${{ steps.tag.outputs.tag }}
