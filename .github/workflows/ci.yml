name: Multi-Stage Deployment

on:
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Check to bump to next Minor (e.g., 1.0.5 -> 1.1.0). Uncheck for Patch (1.0.5 -> 1.0.6).'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    outputs:
      resolved_tag: ${{ steps.gitversion.outputs.semVer }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          configFilePath: DevGitVersion.yml
        env:
          # Method 1: Use Environment Variables to handle the override
          GITVERSION_BRANCHES_MAIN_INCREMENT: ${{ github.event.inputs.bump_version == 'true' && 'Minor' || 'Patch' }}

      - name: Show computed version
        run: |
          echo "SemVer=dev-${{ steps.gitversion.outputs.SemVer }}"
      
      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "test.o"
          git tag "dev-${{ steps.gitversion.outputs.SemVer }}"
          git push origin "dev-${{ steps.gitversion.outputs.SemVer }}"

      # - name: Generate Tag
      #   id: devTag
      #   run: |
      #     # Use the base SemVer from GitVersion
      #     # BASE_VER="${{ steps.gitversion.outputs.semVer }}"
          
      #     # if [[ "${{ github.event.inputs.bump_version }}" != "true" ]]; then
      #       # If not bumping, append the run number as the build identifier
      #       # Result: 1.0.1.42
      #       # FINAL_VER="${BASE_VER}.${{ github.run_number }}"
      #       # echo "Using Patch + Build Number: $FINAL_VER"
      #     # else
      #       # If bumping, keep the clean Minor version from GitVersion
      #       # Result: 1.1.0
      #     #   FINAL_VER="$BASE_VER"
      #     #   echo "Using Minor Bump: $FINAL_VER"
      #     # fi
          
      #     # Save to outputs so you can use it as ${{ steps.devTag.outputs.tag }}
      #     echo "tag=$FINAL_VER" >> $GITHUB_OUTPUT

      # - name: Generate and Push Tag
      #   run: |
      #     git config --global user.name "github-actions[bot]"
      #     git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      #     # Use the semVer output from the 'gitversion' step
      #     NEW_TAG="v-${{ steps.gitversion.outputs.semVer }}"
          
      #     if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
      #       git tag "$NEW_TAG"
      #       git push origin "$NEW_TAG"
      #       echo "Successfully tagged and pushed: $NEW_TAG"
      #     else
      #       echo "Tag $NEW_TAG already exists. Skipping."
      #     fi
      - name: Dev deployment started
        run: |
          echo "========================================"
          echo "  DEV DEPLOYMENT STARTED"
          echo "  Version: dev-${{ steps.gitversion.outputs.semVer }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Run:     ${{ github.run_number }}"
          echo "========================================"

      - name: Deploy to dev
        run: |
          echo "Deploying v-${{ steps.gitversion.outputs.semVer }} to dev environment..."
          # TODO: replace with actual deployment commands
      
      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "abdullah@binaryquest.com"
          git tag "dev-${{ steps.devTag.outputs.tag }}"
          git push origin "dev-${{ steps.devTag.outputs.tag }}"


  deploy-test:
    name: Deploy to Test
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          configFilePath: TestGitVersion.yml
        env:
          # Method 1: Use Environment Variables to handle the override
          GITVERSION_BRANCHES_MAIN_INCREMENT: ${{ github.event.inputs.bump_version == 'true' && 'Minor' || 'Patch' }}

      - name: Show computed version
        run: |
          echo "test-SemVer=${{ steps.version.outputs.SemVer }}"
    
      # - name: Generate  Tag
      #   run: |
      #     git config --global user.name "github-actions[bot]"
      #     git config --global user.email "github-actions[bot]@://github.com"
          
      #     NEW_TAG="v-${{ steps.gitversion.outputs.semVer }}"
          
      #     # Only tag if it doesn't already exist to avoid errors
      #     if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
      #       git tag "$NEW_TAG"
      #       git push origin "$NEW_TAG"
      #       echo "Tagged and pushed: $NEW_TAG"
      #     else
      #       echo "Tag $NEW_TAG already exists. Skipping tag creation."
      #  fi

      - name: Test deployment started
        run: |
          echo "========================================"
          echo "  TEST DEPLOYMENT STARTED"
          echo "  Version: ${{ steps.tag.outputs.tag }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Run:     ${{ github.run_number }}"
          echo "========================================"

      - name: Deploy to test
        run: |
          echo "Deploying ${{ steps.tag.outputs.tag }} to test environment..."
          # TODO: replace with actual deployment commands

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "abdullah@binaryquest.com"
          # git tag "test-${{ steps.gitversion.outputs.SemVer }}"
          # git push origin "test-${{ steps.gitversion.outputs.SemVer }}"
          NEW_TAG="test-${{ steps.gitversion.outputs.semVer }}"
          
          # Only push if it doesn't exist (safety check)
          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

  deploy-live:
    name: Deploy to Live
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: live

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: version
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
          overrideConfig: ${{ github.event.inputs.bump_version == 'true' && '"branches.main.increment=Minor"' || '' }}
       
      - name: Show computed version
        run: |
          echo "v-SemVer=${{ steps.version.outputs.SemVer }}"

      - name: Live deployment started
        run: |
          echo "========================================"
          echo "  LIVE DEPLOYMENT STARTED"
          echo "  Version: ${{ steps.tag.outputs.tag }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Run:     ${{ github.run_number }}"
          echo "========================================"

      - name: Deploy to live
        run: |
          echo "Deploying ${{ steps.tag.outputs.tag }} to live environment..."
          # TODO: replace with actual deployment commands

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "abdullah@binaryquest.com"
          git tag "v-${{ steps.version.outputs.SemVer }}"
          git push origin "v-${{ steps.version.outputs.SemVer }}"

    outputs:
      tag: ${{ steps.tag.outputs.tag }}
